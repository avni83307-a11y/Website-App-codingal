<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Stop Watch </title>
</head>
<body>
    <h1> Stop Watch </h1>
    <div>
        <spam id="seconds">00</spam>:
         <spam id="milliseconds">00</spam>
    </div>
    <button id="button_start"> start </button>
    <button id="button_stop"> stop </button>
    <button id="button_reset"> reset </button>
    <script>
        window.onload=function(){
        var sec = 0
        var millisec = 0
        var appendseconds = document.getElementById("seconds")
        var appendmilliseconds = document.getElementById("milliseconds")
        var buttonstart= document.getElementById("button_start")
        var buttonstop= document.getElementById("button_stop")
        var buttonreset= document.getElementById("button_reset")
        var interval
        buttonstart.onclick = function(){
            clearInterval(interval)
            interval = setInterval(starttimer,10)
        }
         buttonstop.onclick = function(){
            clearInterval(interval)
         }
          buttonreset.onclick = function(){
            clearInterval(interval)
            millisec = 0
            sec = 0
            appendmilliseconds.innerHTML="00"
            appendseconds.innerHTML="00"
         }
         function starttimer(){
            millisec++
            if (millisec <9){
                appendmilliseconds.innerHTML = "0"+millisec
            }
            if(millisec >9){
                appendmilliseconds.innerHTML = millisec  
            }
            if(millisec >99){
                sec++
                appendseconds.innerHTML ="0"+sec
                millisec=0
                appendmilliseconds.innerHTML ="0"+millisec
            }
            if (sec > 9){
                appendseconds.innerHTML = sec
            }
         }
        }

    </script>
</body>
</html>
