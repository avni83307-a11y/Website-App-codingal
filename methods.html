<html>
    <body>
          <p id="join"> </p>
         <p id="firstpop"> </p>
          <p id="finalstack"> </p>
    <script>
        var Fruits =["Apple","Dragon Fruit","Straberry","Blueberry","Mango","Pineapple", "Banana"]
         document.getElementById("join").innerHTML=Fruits.join("*");
           document.getElementById("firstpop").innerHTML=Fruits.pop();
             document.getElementById("finalstack").innerHTML=Fruits;
        </script>
    </body>
</html>
