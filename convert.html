<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Type Conversion </title>
</head>
<body>
    <h1> Type Conversion</h1>
    <div id="result"></div>
      <div id="result1"></div>
      <script>
        var a = 90;
        var b = 76;

        document.getElementById("result").innerHTML="The value of a and b is"+(a+b)
         document.getElementById("result1").innerHTML="The joining of a and b is"+(String(a)+String(b))
      </script>
</body>
</html>
