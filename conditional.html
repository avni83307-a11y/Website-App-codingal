<html>
    <head>

    </head>
    <body>
        <button type="button" onclick="myFunction()"> Try It! </button>
        <p id="hour"></p>
         <p id="greet"></p>
        <script>
            function myFunction(){
                var greeting;
                var time= new Date().getHours();
                 
                if(time< 10){
                    greeting="Good Morning";
                }
                else if(time< 20){
                    greeting="Good Day!";
                }
                 else {
                    greeting="Good Evening!";
                }
                document.getElementById("hour").innerHTML="Current Hour is :"+time;
                 document.getElementById("greet").innerHTML="Current Hour is :"+greeting;
            }
        </script>
    </body>
</html>
