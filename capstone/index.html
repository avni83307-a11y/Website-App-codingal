<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone</title>
    <style>
        body{
        margin:0px;
        background-color:bisque;
      }
      .topnav{
        overflow: hidden;
        background-color: crimson;
      }
      .topnav a{
        float: left ;
        color: blue;
        text-align: center;
        padding: 14px 16px ;
        text-decoration: none;
        font-size: 17px ;
      }
      .topnav a:hover{
        color: palevioletred;
        font-size: 21px;
      }
      .topnav a.active {
        background-color:chartreuse ;
        color: maroon;

      }
      .carousel-container{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 300px;
      }
      .myslides{
        display: none ;
        max-height: 100%;
        max-width: 100%;
      }
    </style>
    
</head>
<body>
<div class="topnav">
    <a class="active" href="index.html"> Home </a>
    <a href="about.html">About</a>
    <a href="contact.html"> Contact </a>
    <a href="gallery.html"> Gallery </a>
</div>
<div class = "carousel-container">
<img class="myslides"src="deer.jpg" width=100% height=100% border=3 alt="deer">
<img class="myslides"src="elephat.jpg" width=100% height=100% border=3 alt="elephant">
<img class="myslides"src="lion.jpg" width=100% height=100% border=3 alt="lion">
<img class="myslides"src="zebra.jpg" width=100% height=100% border=3 alt="zebra">

</div>
<script>
  var index = 0
  function carousel(){
    var i;
    var x = document.getElementsByClassName("myslides")
    for ( i=0;i<x.length;i++){
      x[i].style.display = "none"
    }
    index++;
    if(index >x.length){
      index = 1
    }
    x[index-1].style.display = "block"
    setTimeout(carousel,2000)
  }
  carousel()
</script>
</body>
</html>
