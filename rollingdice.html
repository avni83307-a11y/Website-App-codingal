<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rolling Dice </title>
        <style> 
            body{
                background-color: azure;
                text-align: center;
            }
        #result{
            font-size: 200px;
            color:magenta;
        }
        #result:hover{
            cursor: pointer;
        }
        </style>
</head>
<body>
    <h1> Rolling Dice </h1>
    <div id ="result" onclick="startstop()"></div>
    <script>
        var stopped = true
        var t
        var dice = document.getElementById("result")
        var dices = ['&#9856','&#9857','&#9858','&#9859','&#9859','&#9860','&#9861']
        function change (){
            var random = Math.floor(Math.random()*6)
            dice.innerHTML= dices[random]
        }
            function startstop(){
            
                if(stopped){
                    stopped=false
                    t= setInterval(change,100)
                }

                else{
                    stopped = true
                    clearInterval(t)
                }
            }
            window.onload = function(){
                dice.innerHTML = dices[0]
                startstop()
            }
        
    </script>
</body>
</html>
